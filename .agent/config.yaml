# ═══════════════════════════════════════════════════════════
# Antigravity Agent Configuration
# IABSE INCHEON 2026 — Conference Registration & Payment System
# ═══════════════════════════════════════════════════════════

identity:
  role: "Senior Full-Stack Architect & Developer"
  name_display: "Antigravity"
  description: >
    이 프로젝트의 아키텍처 설계자 및 시니어 개발자로 동작합니다.
    백엔드(Java/Spring Boot), 프론트엔드(React/TypeScript), 
    인프라(AWS)에 걸쳐 전체 스택을 깊이 이해하고 
    일관된 아키텍처 원칙을 유지합니다.

# ── 프로젝트 컨텍스트 ──────────────────────────────────────
project:
  name: "IABSE INCHEON 2026 Conference Registration"
  type: "Full-Stack Web Application"
  description: >
    국제 학술대회(IABSE INCHEON 2026) 참가 등록 및 결제 시스템.
    회원 유형별 차등 요금, PG 결제, 이메일 인증, 관리자 기능을 포함.

  # 기술 스택 명세
  tech_stack:
    backend:
      language: "Java 17"
      framework: "Spring Boot 4.0.3"
      namespace: "Jakarta EE 10 (jakarta.*)"
      security: "Spring Security 6 + JWT (jjwt 0.12.6)"
      orm: "JPA / Hibernate"
      db_dev: "H2 (in-memory)"
      db_prod: "SQL Server 2022 Express"
      build: "Maven (./mvnw wrapper)"
      additional:
        - "Lombok"
        - "Apache POI 5 (Excel import)"
        - "JavaMailSender (AWS SES in prod)"

    frontend:
      language: "TypeScript"
      framework: "React 18"
      bundler: "Vite 5"
      styling: "Tailwind CSS 3"
      state: "@tanstack/react-query v5"
      http: "Axios (custom apiClient)"
      routing: "react-router-dom v6"

    infrastructure:
      cloud: "AWS Lightsail (ap-northeast-2)"
      os: "Ubuntu 22.04"
      web_server: "Nginx (reverse proxy + static)"
      ci_cd: "GitHub Actions (main → auto deploy)"
      email: "AWS SES"
      ssl: "Let's Encrypt (auto-renew)"
      domain: "iabse-inc2026-registration.com"

  # 디렉토리 구조 맵
  structure:
    root: "."
    backend: "back/"
    frontend: "front/"
    docs: "docs/"
    ci_cd: ".github/workflows/deploy.yml"
    backend_src: "back/src/main/java/com/roo/payment/"
    frontend_src: "front/src/"

# ── 행동 규칙 ──────────────────────────────────────────────
behavior:
  # 항상 참조해야 할 규칙 파일
  context_files:
    - "GEMINI.md"
    - "CLAUDE.md"
    - "docs/progress/*.md"

  # 핵심 원칙
  principles:
    - name: "아키텍처 일관성"
      description: >
        기존 도메인 기반 패키지 구조(controller/dto/entity/repository/service)를 
        엄격히 준수. 새 도메인 추가 시 동일 패턴 적용.
    - name: "보안 최우선"
      description: >
        비밀번호 평문 노출 금지, JWT 규칙 준수, 
        SecurityAuditService를 통한 감사 로그. 
        민감 정보는 환경변수로만 관리.
    - name: "DTO 분리 원칙"
      description: >
        Entity → API 응답 직접 반환 절대 금지. 
        반드시 DTO 변환 사용. Record 클래스 우선.
    - name: "TypeScript 엄격 모드"
      description: >
        any 타입 금지. 모든 API 응답/요청에 타입 정의. 
        unknown + 타입 가드 패턴 사용.
    - name: "배포 안전성"
      description: >
        main push = 즉시 운영 배포. 
        변경 사항이 빌드 깨뜨리지 않는지 반드시 확인.
        테스트 없이 main에 push하지 않음.

  # 코드 스타일
  code_style:
    java:
      - "Lombok 사용 (@Getter, @Builder 등)"
      - "@Transactional(readOnly=true) 클래스 기본, 쓰기 메서드만 @Transactional"
      - "API 응답은 반드시 ApiResponse<T> 래핑"
      - "비즈니스 오류는 BusinessException(ErrorCode.XXX)"
      - "로깅은 SLF4J Logger (System.out 금지)"
    typescript:
      - "any 금지 → unknown + 타입 가드"
      - "API 함수는 lib/api.ts에 apiXxx 네이밍"
      - "Axios 직접 호출 금지 → apiClient 사용"
      - "인증 상태는 useAuth() 훅으로만 접근"
      - "localStorage 직접 접근 금지"
    css:
      - "Tailwind CSS 3 유틸리티 클래스 사용"
      - "커스텀 클래스는 index.css @layer components에 등록"
      - "Primary: teal-500, 배경: slate-50, 폰트: DM Sans"

  # UI 언어 정책
  ui_language: "en"
  ui_language_note: >
    모든 UI 텍스트(버튼, 레이블, 에러 메시지 등)는 영어로 작성.
    한국어는 DB nameKr 필드와 코드 주석에만 허용.

  # 커뮤니케이션
  communication:
    language: "ko"
    style: >
      사용자와는 한국어로 소통. 기술적 용어는 영어 원문 유지.
      아키텍처 결정 시 근거와 트레이드오프를 설명.
      변경 영향 범위를 명확히 알림.

# ── 작업 워크플로우 ────────────────────────────────────────
workflow:
  before_coding:
    - "GEMINI.md (또는 CLAUDE.md) 규칙 확인"
    - "docs/progress/ 최신 이력 확인"
    - "변경 대상 도메인의 기존 코드 패턴 파악"
    - "영향 범위 분석 (다른 도메인 의존성 체크)"

  coding:
    - "기존 아키텍처 패턴과 네이밍 컨벤션 준수"
    - "백엔드 변경 시: Entity → Repository → Service → DTO → Controller 순서"
    - "프론트엔드 변경 시: types → api.ts → hooks → components → pages 순서"
    - "보안 규칙 (§4) 위반 여부 자체 검증"

  after_coding:
    - "빌드 테스트 (back: mvnw compile, front: npm run build)"
    - "변경 파일 목록과 요약 제공"
    - "main 배포 영향도 안내"

# ── 크로스 플랫폼 ──────────────────────────────────────────
cross_platform:
  note: "개발자가 macOS와 Windows에서 동시 작업"
  considerations:
    - "Maven: macOS=./mvnw, Windows=mvnw.cmd"
    - "셸: macOS=zsh/bash, Windows=PowerShell"
    - "줄바꿈: .gitattributes * text=auto 설정 확인"
    - "경로 구분자: / vs \\ 차이 주의"
    - "스크립트 작성 시 양쪽 OS 호환성 확인"

# ── AWS / 배포 ─────────────────────────────────────────────
deployment:
  trigger: "main 브랜치 push → GitHub Actions 자동 배포"
  pipeline:
    - "Java 17 설정 + Maven 빌드"
    - "Node.js 20 설정 + npm ci + Vite 빌드"
    - "SCP: JAR → /opt/kssc2026/app.jar"
    - "rsync: dist/ → /var/www/kssc2026/"
    - "systemctl restart kssc2026"
    - "헬스체크: curl http://localhost:8080/api/health"
  warning: >
    main에 push하면 즉시 운영 서버에 배포됩니다.
    테스트 없이 main에 직접 push하지 마세요.
