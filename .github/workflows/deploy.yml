name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:  # 수동 실행 가능

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 백엔드 빌드 ──
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend (Maven)
        working-directory: back
        run: ./mvnw clean package -DskipTests -q

      # ── 프론트엔드 빌드 ──
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Build Frontend (Vite)
        working-directory: front
        run: |
          npm ci
          npm run build

      # ── SSH 키 설정 ──
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail.pem
          chmod 600 ~/.ssh/lightsail.pem
          ssh-keyscan -H ${{ secrets.LIGHTSAIL_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 파일 전송 ──
      - name: Upload Backend JAR
        run: |
          scp -i ~/.ssh/lightsail.pem \
            back/target/*.jar \
            ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/opt/kssc2026/app.jar.new

      - name: Upload Frontend Build
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/lightsail.pem" \
            front/dist/ \
            ubuntu@${{ secrets.LIGHTSAIL_HOST }}:/var/www/kssc2026/

      # ── 서비스 재시작 ──
      - name: Restart Application
        run: |
          ssh -i ~/.ssh/lightsail.pem ubuntu@${{ secrets.LIGHTSAIL_HOST }} << 'EOF'
            # JAR 교체
            sudo systemctl stop kssc2026
            mv /opt/kssc2026/app.jar.new /opt/kssc2026/app.jar
            sudo systemctl start kssc2026

            # 헬스체크 (최대 30초 대기)
            echo "Waiting for application to start..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "Application started successfully!"
                exit 0
              fi
              sleep 1
            done
            echo "Warning: Health check timeout (app may still be starting)"
            sudo systemctl status kssc2026 --no-pager
          EOF
