name: Deploy to AWS Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SERVER_HOST: ${{ secrets.LIGHTSAIL_HOST }}
  SERVER_USER: ubuntu
  SSH_KEY_PATH: /home/runner/.ssh/lightsail.pem
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 백엔드 빌드 ──
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Backend (Maven)
        working-directory: back
        run: ./mvnw clean package -DskipTests -q

      # ── 프론트엔드 빌드 ──
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Build Frontend (Vite)
        working-directory: front
        env:
          VITE_PAYGATE_MID_DOMESTIC: ${{ secrets.VITE_PAYGATE_MID_DOMESTIC }}
          VITE_PAYGATE_MID_OVERSEAS: ${{ secrets.VITE_PAYGATE_MID_OVERSEAS }}
          VITE_PAYGATE_METHOD: ${{ secrets.VITE_PAYGATE_METHOD }}
        run: |
          npm ci
          npm run build

      # ── SSH 키 설정 ──
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIGHTSAIL_SSH_KEY }}" > $SSH_KEY_PATH
          chmod 600 $SSH_KEY_PATH
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null

      # ── 파일 전송 ──
      - name: Upload Backend JAR
        run: |
          scp -i $SSH_KEY_PATH \
            back/target/*.jar \
            $SERVER_USER@$SERVER_HOST:/opt/kssc2026/app.jar.new

      - name: Upload Frontend Build
        run: |
          rsync -avz --delete -e "ssh -i $SSH_KEY_PATH" \
            front/dist/ \
            $SERVER_USER@$SERVER_HOST:/var/www/kssc2026/

      # ── 서비스 재시작 ──
      - name: Restart Application
        run: |
          ssh -i $SSH_KEY_PATH $SERVER_USER@$SERVER_HOST << 'EOF'
            sudo systemctl stop kssc2026 2>/dev/null || true
            mv /opt/kssc2026/app.jar.new /opt/kssc2026/app.jar
            sudo systemctl start kssc2026

            echo "Waiting for application to start..."
            for i in $(seq 1 60); do
              if curl -sf http://localhost:8080/api/health > /dev/null 2>&1; then
                echo "Application started successfully!"
                exit 0
              fi
              sleep 2
            done
            echo "Warning: Health check timeout"
            sudo journalctl -u kssc2026 --no-pager -n 30
            exit 1
          EOF
