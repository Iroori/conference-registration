spring:
  application:
    name: conference-registration

  profiles:
    active: dev

---
# ===== 개발 환경 (서버 MSSQL 연결) =====
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:sqlserver://52.79.209.95:1433;databaseName=kssc2026_dev;encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: kssc_dev
    password: Kssc2026!Dev#User

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  mail:
    # ── 로컬 개발: app.dev-mode=true 이면 실제 메일 미발송, 콘솔 로그 출력 ──
    # ── AWS SES SMTP 실제 발송 테스트 시 아래 값을 환경변수로 주입 ──────────
    # ── SES SMTP 자격증명은 AWS Access Key와 별개로 SES 콘솔에서 발급 ────────
    host: ${MAIL_HOST:email-smtp.ap-northeast-2.amazonaws.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}          # SES SMTP 자격증명 사용자명 (IAM Access Key 아님)
    password: ${MAIL_PASSWORD:}          # SES SMTP 자격증명 비밀번호
    test-connection: false               # 시작 시 SMTP 연결 테스트 건너뜀 (dev용)
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:kssc2026-conference-registration-secret-key-very-long-string-for-security}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  email-verification:
    expiration-minutes: 10
  cors:
    allowed-origins: http://localhost:5173,http://localhost:3000
  admin:
    secret-key: ${ADMIN_SECRET:admin-secret-2026}
  registration:
    pre-registration:
      start-date: ${REG_PRE_START:2026-05-30}
      end-date:   ${REG_PRE_END:2026-07-31}
    early-bird:
      start-date: ${REG_EARLY_START:2026-08-01}
      end-date:   ${REG_EARLY_END:2026-08-31}
    regular:
      start-date: ${REG_REGULAR_START:2026-09-01}
      end-date:   ${REG_REGULAR_END:2026-10-31}
  paygate:
    verify-url: https://service.paygate.net/admin/settle/verifyReceived.jsp?tid=%s&verifyNum=100
    cancel-url:  https://service.paygate.net/service/cancelAPI.json
    event-date:  ${PAYGATE_EVENT_DATE:2026-09-16}     # IABSE Congress Incheon 2026 opening day
  dev-mode: true                    # 개발 모드: 이메일 콘솔 출력 + /api/dev 엔드포인트 활성화

---
# ===== 운영 환경 (SQL Server) =====
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:sqlserver://${DB_HOST:localhost}:${DB_PORT:1433};databaseName=${DB_NAME:kssc2026};encrypt=true;trustServerCertificate=true
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.SQLServerDialect
    hibernate:
      ddl-auto: update          # 초기 배포: update → 스키마 생성 후 validate로 복원
    show-sql: false

  mail:
    host: ${MAIL_HOST:email-smtp.ap-northeast-2.amazonaws.com}  # AWS SES SMTP 엔드포인트
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}    # SES SMTP 자격증명 사용자명
    password: ${MAIL_PASSWORD}    # SES SMTP 자격증명 비밀번호
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
    refresh-expiration-ms: 604800000
  email-verification:
    expiration-minutes: 10
  cors:
    allowed-origins: ${CORS_ORIGINS:https://iabse-inc2026-registration.com}
  admin:
    secret-key: ${ADMIN_SECRET}
  registration:
    pre-registration:
      start-date: ${REG_PRE_START:2026-05-30}
      end-date:   ${REG_PRE_END:2026-07-31}
    early-bird:
      start-date: ${REG_EARLY_START:2026-08-01}
      end-date:   ${REG_EARLY_END:2026-08-31}
    regular:
      start-date: ${REG_REGULAR_START:2026-09-01}
      end-date:   ${REG_REGULAR_END:2026-10-31}
  paygate:
    verify-url: ${PAYGATE_VERIFY_URL:https://service.paygate.net/admin/settle/verifyReceived.jsp?tid=%s&verifyNum=100}
    cancel-url:  ${PAYGATE_CANCEL_URL:https://service.paygate.net/service/cancelAPI.json}
    event-date:  ${PAYGATE_EVENT_DATE:2026-09-16}     # IABSE Congress Incheon 2026 opening day
  dev-mode: false
